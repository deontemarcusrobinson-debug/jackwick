[build]
builder = "NIXPACKS"
# Do NOT run npm ci here — Nixpacks already installs deps.
# A second npm ci was causing EBUSY on /app/node_modules/.cache
buildCommand = "echo 'assets already built'"

[deploy]
startCommand = "node scripts/railway-boot.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
